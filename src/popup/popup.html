<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Exporter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Chat Exporter</h1>
    </header>

    <main>
      <div id="status" class="status" aria-live="polite"></div>

      <div class="export-row">
        <select id="format-select" class="format-select" aria-label="Export format">
          <option value="markdown">Markdown</option>
        </select>
        <button id="export-btn" class="btn-primary">
          Export
        </button>
      </div>
    </main>

    <!-- type="module" lets popup.js use ES module imports (formatters, utils) -->
    <script type="module" src="popup.js"></script>
  </body>
</html>
